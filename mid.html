<title>Тест на мидость</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --red: #cc1a1a;
    --red-hot: #ff2b2b;
    --dim: #1c1c28;
    --text: #e8e2d0;
    --muted: #7a7065;
  }

  html, body {
    width: 100%; height: 100%;
    background-color: #0a0a0f;
    background-image:
      linear-gradient(#1a1a2a 1px, transparent 1px),
      linear-gradient(90deg, #1a1a2a 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem;
    transition: opacity .4s, transform .4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

  #start-screen { background: transparent; }

  .logo {
    font-family: 'Creepster', cursive;
    font-size: clamp(4rem, 14vw, 9rem);
    color: var(--red-hot);
    text-shadow:
      0 0 20px #ff000088,
      0 0 60px #ff000033,
      0 2px 0 #6b0000,
      0 4px 0 #3a0000;
    letter-spacing: .06em;
    line-height: 1;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,100% { opacity:1; text-shadow: 0 0 20px #ff000088, 0 0 60px #ff000033, 0 2px 0 #6b0000; }
    92%      { opacity:1; }
    93%      { opacity:.6; text-shadow: none; }
    94%      { opacity:1; }
    97%      { opacity:1; }
    98%      { opacity:.4; text-shadow: none; }
    99%      { opacity:1; }
  }

  .tagline {
    font-size: 1.1rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -.8rem;
  }

  .start-btn {
    margin-top: 1rem;
    padding: .9rem 3.5rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, #6b0000 0%, #cc1a1a 50%, #6b0000 100%);
    border: 2px solid #ff2b2b55;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 0 30px #cc1a1a55, inset 0 1px 0 #ff444466;
  }
  .start-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 0%, #ffffff22 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform .4s;
  }
  .start-btn:hover { transform: scale(1.04); box-shadow: 0 0 50px #ff2b2b88, inset 0 1px 0 #ff444466; }
  .start-btn:hover::before { transform: translateX(100%); }
  .start-btn:active { transform: scale(.97); }

  .web-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: .18; }

  /* ── QUESTION ── */
  #question-screen { gap: 1.5rem; }

  .q-text {
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    font-weight: 700;
    letter-spacing: .08em;
    text-align: center;
    color: var(--text);
    text-shadow: 0 0 20px #ff2b2b44;
    padding: 0 1rem;
  }

  .heroes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .8rem;
    width: min(420px, 90vw);
  }

  .hero-btn {
    padding: .85rem 1rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text);
    background: var(--dim);
    border: 1px solid #ffffff18;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s, border-color .2s, transform .12s, box-shadow .2s;
  }
  .hero-btn:hover {
    background: #2a1a1a;
    border-color: var(--red);
    box-shadow: 0 0 18px #cc1a1a55;
    transform: translateY(-2px);
  }
  .hero-btn:active { transform: scale(.96); }

  /* ── RESULT ── */
  #result-screen { gap: 1.8rem; }
  .result-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(2rem, 8vw, 4.5rem);
    color: #6bcc6b;
    text-shadow: 0 0 20px #00ff0066;
    text-align: center;
  }
  .result-sub {
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: .15em;
    text-transform: uppercase;
  }
  .result-btn {
    padding: .7rem 2.5rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #fff;
    background: #1a2a1a;
    border: 1px solid #6bcc6b55;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s, box-shadow .2s;
  }
  .result-btn:hover { background: #2a4a2a; box-shadow: 0 0 20px #00ff0044; }

  /* ── SPIDER CHAOS ── */
  #chaos-layer {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  .spider {
    position: absolute;
    pointer-events: none; /* убито убийство пауков */
    cursor: default;
    line-height: 1;
    animation: spiderDrop .4s cubic-bezier(.22,1,.36,1) both;
    /* позиции меняются плавно */
    transition: left .7s cubic-bezier(.25,.8,.25,1), top .7s cubic-bezier(.25,.8,.25,1);
    will-change: left, top;
  }

  /* картинка-паук вместо эмодзи */
  .spider img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @keyframes spiderDrop {
    from { opacity:0; transform: scale(0) rotate(-40deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }

  #flash {
    position: fixed; inset: 0;
    background: #ff000022;
    pointer-events: none;
    z-index: 998;
    opacity: 0;
    transition: opacity .15s;
  }
  #flash.pop { opacity: 1; }

  #countdown {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    font-family: 'Creepster', cursive;
    font-size: 2.5rem;
    color: #ff2b2b;
    opacity: 0;
    z-index: 1001;
    text-shadow: 0 0 20px #ff000066;
    transition: opacity .5s;
    pointer-events: none;
  }
  #countdown.visible { opacity: 1; }
</style>
</head>
<body>



<!-- START -->
<div id="start-screen" class="screen">
  <div class="logo">МИДОСТЬ</div>
  <div class="tagline">тест на мид™</div>
  <button class="start-btn" onclick="showQuestion()">▶ НАЧАТЬ ТЕСТ</button>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen hidden">
  <div class="q-text">Кого вы бы пикнули на мид?</div>
  <div class="heroes">
    <button class="hero-btn" onclick="pickHero('Кез')">КЕЗ</button>
    <button class="hero-btn" onclick="pickHero('Бруда')">БРУДА</button>
    <button class="hero-btn" onclick="pickHero('Шейкер')">ШЕЙКЕР</button>
    <button class="hero-btn" onclick="pickHero('СФ')">СФ</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen hidden">
  <div class="result-title">✅ ТЕСТ ПРОЙДЕН</div>
  <div class="result-sub">Ты определённо не бруд</div>
  <button class="result-btn" onclick="goStart()">↩ СНОВА</button>
</div>

<!--
  ЗВУК: положи свой файл рядом с mid.html на GitHub
  и замени "spider.mp3" на точное имя файла (регистр важен!)
  Пример: src="spider.mp3" или src="Spider.MP3"
-->
<audio id="bruda-sound" src="spider.mp3" preload="auto" loop></audio>

<!-- chaos -->
<div id="chaos-layer"></div>
<div id="flash"></div>
<div id="countdown"></div>

<script>
const MAX_SPIDERS  = 28 + Math.floor(Math.random() * 8); // 28–35
const LIFETIME_MS  = 20000 + Math.floor(Math.random() * 5000); // 20–25s
const RAMP_UP_MS   = 7000;
const RESHUFFLE_MS = 1200;

// Список гифок пауков — положи их на GitHub рядом с mid.html
// Можно добавить сколько угодно файлов, они выбираются случайно
const SPIDER_GIFS = [
  'spider1.gif',
  'spider2.gif',
  'spider3.gif',
  'spider4.gif',
  'spider5.gif',
];

let chaosActive = false;
let chaosTimers = [];
let spiderEls   = [];

// ── Sound ─────────────────────────────────────────────────────────
function playBrudaSound() {
  const audio = document.getElementById('bruda-sound');
  if (!audio) return;
  audio.currentTime = 0;
  audio.play().catch(() => {});
}
function stopBrudaSound() {
  const audio = document.getElementById('bruda-sound');
  if (!audio) return;
  audio.pause();
  audio.currentTime = 0;
}

// ── Navigation ────────────────────────────────────────────────────
function go(showId, hideIds) {
  document.getElementById(showId).classList.remove('hidden');
  hideIds.forEach(id => document.getElementById(id).classList.add('hidden'));
}
function showQuestion() { go('question-screen', ['start-screen', 'result-screen']); }
function goStart()      { go('start-screen', ['question-screen', 'result-screen']); }

function pickHero(name) {
  if (name === 'Бруда') {
    playBrudaSound();
    startChaos();
  } else {
    go('result-screen', ['start-screen', 'question-screen']);
  }
}

// ── CHAOS ─────────────────────────────────────────────────────────
function startChaos() {
  chaosActive = true;

  ['start-screen','question-screen','result-screen'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));

  const layer = document.getElementById('chaos-layer');
  layer.innerHTML = '';
  spiderEls = [];

  const spawnInterval = Math.max(Math.floor(RAMP_UP_MS / MAX_SPIDERS), 50);
  const chaosStart = Date.now();

  function spawnOne() {
    if (!chaosActive || spiderEls.length >= MAX_SPIDERS) return;
    spawnSpider(layer);
    flash();
    if (spiderEls.length < MAX_SPIDERS) {
      const elapsed = Date.now() - chaosStart;
      const fast = elapsed > LIFETIME_MS * 0.5;
      chaosTimers.push(setTimeout(spawnOne, fast ? Math.floor(spawnInterval / 3) : spawnInterval));
    }
  }

  function reshuffle() {
    if (!chaosActive) return;
    randomisePositions();
    chaosTimers.push(setTimeout(reshuffle, RESHUFFLE_MS));
  }

  function tick() {
    if (!chaosActive) return;
    const left = Math.ceil((LIFETIME_MS - (Date.now() - chaosStart)) / 1000);
    const cd = document.getElementById('countdown');
    cd.classList.add('visible');
    cd.textContent = left > 0 ? `${left}s` : '';
    if (left > 0) chaosTimers.push(setTimeout(tick, 500));
  }

  spawnOne();
  reshuffle();
  tick();
  chaosTimers.push(setTimeout(endChaos, LIFETIME_MS));
}

function randomGif() {
  return SPIDER_GIFS[Math.floor(Math.random() * SPIDER_GIFS.length)];
}

function spawnSpider(layer) {
  const size = 80 + Math.floor(Math.random() * 80); // 80–160px

  const el = document.createElement('div');
  el.className = 'spider';
  el.style.width  = size + 'px';
  el.style.height = size + 'px';

  // случайная позиция по всему экрану
  el.style.left = Math.random() * Math.max(window.innerWidth  - size, 0) + 'px';
  el.style.top  = Math.random() * Math.max(window.innerHeight - size, 0) + 'px';

  // картинка-гифка
  const img = document.createElement('img');
  img.src = randomGif();
  img.alt = '';
  img.draggable = false;
  el.appendChild(img);

  layer.appendChild(el);
  spiderEls.push(el);
}

function randomisePositions() {
  const live = spiderEls.filter(e => e.isConnected);
  spiderEls = live;
  if (!live.length) return;

  // каждый паук летит в случайную точку экрана независимо
  live.forEach(el => {
    const w = parseInt(el.style.width)  || 100;
    const h = parseInt(el.style.height) || 100;
    const x = Math.random() * Math.max(window.innerWidth  - w, 0);
    const y = Math.random() * Math.max(window.innerHeight - h, 0);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });
}

function flash() {
  const f = document.getElementById('flash');
  f.classList.add('pop');
  setTimeout(() => f.classList.remove('pop'), 150);
}

function endChaos() {
  chaosActive = false;
  chaosTimers.forEach(clearTimeout);
  chaosTimers = [];
  stopBrudaSound();
  document.getElementById('countdown').classList.remove('visible');

  spiderEls.forEach((el, i) => {
    setTimeout(() => {
      el.style.transition = 'transform .3s, opacity .3s';
      el.style.transform = 'scale(0) rotate(360deg)';
      el.style.opacity = '0';
    }, i * 30);
  });

  const count = spiderEls.length;
  setTimeout(() => {
    document.getElementById('chaos-layer').innerHTML = '';
    spiderEls = [];
    goStart();
  }, count * 30 + 500);
}
</script>
</body>

<div id="countdown"></div>

<script>
const MAX_SPIDERS  = 28 + Math.floor(Math.random() * 8); // 28–35
const LIFETIME_MS  = 20000 + Math.floor(Math.random() * 5000); // 20–25s
const RAMP_UP_MS   = 7000;
const RESHUFFLE_MS = 1200;

// Список гифок пауков — положи их на GitHub рядом с mid.html
// Можно добавить сколько угодно файлов, они выбираются случайно
const SPIDER_GIFS = [
  'spider1.gif',
  'spider2.gif',
  'spider3.gif',
  'spider4.gif',
  'spider5.gif',
];

let chaosActive = false;
let chaosTimers = [];
let spiderEls   = [];

// ── Sound ─────────────────────────────────────────────────────────
function playBrudaSound() {
  const audio = document.getElementById('bruda-sound');
  if (!audio) return;
  audio.currentTime = 0;
  audio.play().catch(() => {});
}
function stopBrudaSound() {
  const audio = document.getElementById('bruda-sound');
  if (!audio) return;
  audio.pause();
  audio.currentTime = 0;
}

// ── Navigation ────────────────────────────────────────────────────
function go(showId, hideIds) {
  document.getElementById(showId).classList.remove('hidden');
  hideIds.forEach(id => document.getElementById(id).classList.add('hidden'));
}
function showQuestion() { go('question-screen', ['start-screen', 'result-screen']); }
function goStart()      { go('start-screen', ['question-screen', 'result-screen']); }

function pickHero(name) {
  if (name === 'Бруда') {
    playBrudaSound();
    startChaos();
  } else {
    go('result-screen', ['start-screen', 'question-screen']);
  }
}

// ── CHAOS ─────────────────────────────────────────────────────────
function startChaos() {
  chaosActive = true;

  ['start-screen','question-screen','result-screen'].forEach(id =>
    document.getElementById(id).classList.add('hidden'));

  const layer = document.getElementById('chaos-layer');
  layer.innerHTML = '';
  spiderEls = [];

  const spawnInterval = Math.max(Math.floor(RAMP_UP_MS / MAX_SPIDERS), 50);
  const chaosStart = Date.now();

  function spawnOne() {
    if (!chaosActive || spiderEls.length >= MAX_SPIDERS) return;
    spawnSpider(layer);
    flash();
    if (spiderEls.length < MAX_SPIDERS) {
      const elapsed = Date.now() - chaosStart;
      const fast = elapsed > LIFETIME_MS * 0.5;
      chaosTimers.push(setTimeout(spawnOne, fast ? Math.floor(spawnInterval / 3) : spawnInterval));
    }
  }

  function reshuffle() {
    if (!chaosActive) return;
    randomisePositions();
    chaosTimers.push(setTimeout(reshuffle, RESHUFFLE_MS));
  }

  function tick() {
    if (!chaosActive) return;
    const left = Math.ceil((LIFETIME_MS - (Date.now() - chaosStart)) / 1000);
    const cd = document.getElementById('countdown');
    cd.classList.add('visible');
    cd.textContent = left > 0 ? `${left}s` : '';
    if (left > 0) chaosTimers.push(setTimeout(tick, 500));
  }

  spawnOne();
  reshuffle();
  tick();
  chaosTimers.push(setTimeout(endChaos, LIFETIME_MS));
}

function randomGif() {
  return SPIDER_GIFS[Math.floor(Math.random() * SPIDER_GIFS.length)];
}

function spawnSpider(layer) {
  const size = 80 + Math.floor(Math.random() * 80); // 80–160px

  const el = document.createElement('div');
  el.className = 'spider';
  el.style.width  = size + 'px';
  el.style.height = size + 'px';

  // случайная позиция по всему экрану
  el.style.left = Math.random() * Math.max(window.innerWidth  - size, 0) + 'px';
  el.style.top  = Math.random() * Math.max(window.innerHeight - size, 0) + 'px';

  // картинка-гифка
  const img = document.createElement('img');
  img.src = randomGif();
  img.alt = '';
  img.draggable = false;
  el.appendChild(img);

  layer.appendChild(el);
  spiderEls.push(el);
}

function randomisePositions() {
  const live = spiderEls.filter(e => e.isConnected);
  spiderEls = live;
  if (!live.length) return;

  // каждый паук летит в случайную точку экрана независимо
  live.forEach(el => {
    const w = parseInt(el.style.width)  || 100;
    const h = parseInt(el.style.height) || 100;
    const x = Math.random() * Math.max(window.innerWidth  - w, 0);
    const y = Math.random() * Math.max(window.innerHeight - h, 0);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
  });
}

function flash() {
  const f = document.getElementById('flash');
  f.classList.add('pop');
  setTimeout(() => f.classList.remove('pop'), 150);
}

function endChaos() {
  chaosActive = false;
  chaosTimers.forEach(clearTimeout);
  chaosTimers = [];
  stopBrudaSound();
  document.getElementById('countdown').classList.remove('visible');

  spiderEls.forEach((el, i) => {
    setTimeout(() => {
      el.style.transition = 'transform .3s, opacity .3s';
      el.style.transform = 'scale(0) rotate(360deg)';
      el.style.opacity = '0';
    }, i * 30);
  });

  const count = spiderEls.length;
  setTimeout(() => {
    document.getElementById('chaos-layer').innerHTML = '';
    spiderEls = [];
    goStart();
  }, count * 30 + 500);
}
</script>
</body>
</html>
