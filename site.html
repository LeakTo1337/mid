<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест на мидость</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@400;700&display=swap');
  
  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }
  
  :root {
    --red: #cc1a1a;
    --red-hot: #ff2b2b;
    --dim: #1c1c28;
    --text: #e8e2d0;
    --muted: #7a7065;
  }
  
  html, body {
    width: 100%; 
    height: 100%;
    background-color: #0a0a0f;
    background-image:
      linear-gradient(#1a1a2a 1px, transparent 1px),
      linear-gradient(90deg, #1a1a2a 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .screen {
    display: none;
    position: fixed; 
    inset: 0;
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    gap: 2rem;
  }
  
  .screen.active {
    display: flex;
  }

  /* ── LOGO ── */
  .logo {
    font-family: 'Creepster', cursive;
    font-size: clamp(4rem, 14vw, 9rem);
    color: var(--red-hot);
    text-shadow:
      0 0 20px #ff000088,
      0 0 60px #ff000033,
      0 2px 0 #6b0000,
      0 4px 0 #3a0000;
    letter-spacing: .06em;
    line-height: 1;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,100% { opacity:1; }
    92% { opacity:1; }
    93% { opacity:.6; }
    94% { opacity:1; }
    97% { opacity:1; }
    98% { opacity:.4; }
    99% { opacity:1; }
  }

  .tagline {
    font-size: 1.1rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -.8rem;
  }

  /* START BTN */
  .start-btn {
    margin-top: 1rem;
    padding: .9rem 3.5rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, #6b0000 0%, #cc1a1a 50%, #6b0000 100%);
    border: 2px solid #ff2b2b55;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .15s, box-shadow .15s;
  }

  .start-btn:hover { 
    transform: scale(1.04); 
    box-shadow: 0 0 50px #ff2b2b88; 
  }

  /* QUESTION */
  #question-screen { gap: 1.5rem; }
  
  .q-text {
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    font-weight: 700;
    letter-spacing: .08em;
    text-align: center;
    color: var(--text);
    padding: 0 1rem;
  }

  .heroes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .8rem;
    width: min(420px, 90vw);
  }

  .hero-btn {
    padding: .85rem 1rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text);
    background: var(--dim);
    border: 1px solid #ffffff18;
    border-radius: 4px;
    cursor: pointer;
    transition: all .15s;
  }

  .hero-btn:hover {
    background: #2a1a1a;
    border-color: var(--red);
    box-shadow: 0 0 18px #cc1a1a55;
    transform: translateY(-2px);
  }

  /* RESULT */
  #result-screen { gap: 1.8rem; }
  
  .result-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(2rem, 8vw, 4.5rem);
    color: #6bcc6b;
    text-shadow: 0 0 20px #00ff0066;
    text-align: center;
  }

  .result-btn {
    padding: .7rem 2.5rem;
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #fff;
    background: #1a2a1a;
    border: 1px solid #6bcc6b55;
    border-radius: 4px;
    cursor: pointer;
  }

  .result-btn:hover { 
    background: #2a4a2a; 
    box-shadow: 0 0 20px #00ff0044; 
  }

  /* ── SPIDER CHAOS ── */
  #chaos-layer {
    position: fixed; 
    inset: 0;
    pointer-events: none;
    z-index: 999;
    display: none;
    overflow: hidden;
  }
  
  #chaos-layer.active { 
    display: block; 
  }

  .spider {
    position: absolute;
    pointer-events: none;
    line-height: 1;
    animation: spiderDrop .4s cubic-bezier(.22,1,.36,1) both;
    will-change: left, top, transform;
  }

  .spider img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  @keyframes spiderDrop {
    from { 
      opacity:0; 
      transform: scale(0.3) rotate(-40deg); 
    }
    to { 
      opacity:1; 
      transform: scale(1) rotate(0deg); 
    }
  }
</style>
</head>
<body>

<!-- START -->
<div id="start-screen" class="screen active">
  <div class="logo">МИДОСТЬ</div>
  <div class="tagline">тест на мид™</div>
  <button class="start-btn" onclick="showQuestion()">▶ НАЧАТЬ ТЕСТ</button>
</div>

<!-- QUESTION -->
<div id="question-screen" class="screen">
  <div class="q-text">Кого вы бы пикнули на мид?</div>
  <div class="heroes">
    <button class="hero-btn" onclick="pickHero('Кез')">КЕЗ</button>
    <button class="hero-btn" onclick="pickHero('Бруда')">БРУДА</button>
    <button class="hero-btn" onclick="pickHero('Шейкер')">ШЕЙКЕР</button>
    <button class="hero-btn" onclick="pickHero('СФ')">СФ</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen" class="screen">
  <div class="result-title">✅ ТЕСТ ПРОЙДЕН</div>
  <div class="result-sub">Ты определённо не еблан</div>
  <button class="result-btn" onclick="goStart()">↩ СНОВА</button>
</div>

<!-- SOUND -->
<audio id="bruda-sound" src="spider.mp3" preload="auto" loop></audio>

<!-- CHAOS -->
<div id="chaos-layer"></div>

<script>
const MAX_SPIDERS = 1000;           // ← ещё больше пауков
const SPIDER_GIFS = ['spider1.gif','spider2.gif','spider3.gif','spider4.gif','spider5.gif'];

let chaosActive = false;
let spiderEls = [];

// ── Sound ──────────────────────────────────────────────────────
function playBrudaSound() {
  const a = document.getElementById('bruda-sound');
  if (!a) return;
  
  a.volume = 0.6;           // ← уменьшил громкость
  a.currentTime = 0;
  a.play().catch(e => console.log("Audio error:", e));
  
  return a;
}

function stopBrudaSound() {
  const a = document.getElementById('bruda-sound');
  if (a) {
    a.pause();
    a.currentTime = 0;
  }
}

// ── Navigation ─────────────────────────────────────────────────
function showOnly(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showQuestion() { 
  showOnly('question-screen'); 
}

function goStart() { 
  showOnly('start-screen'); 
}

function pickHero(name) {
  if (name === 'Бруда') {
    const audio = playBrudaSound();
    startChaos(audio);
  } else {
    showOnly('result-screen');
  }
}

// ── CHAOS ──────────────────────────────────────────────────────
function startChaos(audio) {
  chaosActive = true;
  
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  
  const layer = document.getElementById('chaos-layer');
  layer.innerHTML = '';
  spiderEls = [];
  layer.classList.add('active');

  // Длительность атаки = длительность звука
  const attackDuration = audio.duration ? audio.duration * 1000 : 18000;

  // Быстрый начальный залп
  for (let i = 0; i < 80; i++) {
    setTimeout(() => spawnSpider(layer), i * 6);
  }

  const spawnInterval = 28; // очень агрессивно

  function spawnLoop() {
    if (!chaosActive || spiderEls.length >= MAX_SPIDERS) return;
    spawnSpider(layer);
    setTimeout(spawnLoop, spawnInterval);
  }

  spawnLoop();

  // Перемешивание
  const shuffleInterval = setInterval(() => {
    if (!chaosActive) return;
    randomisePositions();
  }, 550);

  // Завершаем вместе с окончанием звука
  setTimeout(() => {
    endChaos(shuffleInterval);
  }, attackDuration);
}

function spawnSpider(layer) {
  const size = 40 + Math.random() * 70;
  
  const el = document.createElement('div');
  el.className = 'spider';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = Math.random() * (window.innerWidth - size) + 'px';
  el.style.top = Math.random() * (window.innerHeight - size) + 'px';
  
  const img = document.createElement('img');
  img.src = SPIDER_GIFS[Math.floor(Math.random() * SPIDER_GIFS.length)];
  img.alt = '';
  img.draggable = false;
  el.appendChild(img);
  
  layer.appendChild(el);
  spiderEls.push(el);
}

function randomisePositions() {
  spiderEls = spiderEls.filter(el => el.isConnected);
  
  spiderEls.forEach(el => {
    const w = parseFloat(el.style.width) || 60;
    const h = parseFloat(el.style.height) || 60;
    el.style.left = Math.random() * (window.innerWidth - w) + 'px';
    el.style.top = Math.random() * (window.innerHeight - h) + 'px';
  });
}

function endChaos(shuffleInterval) {
  chaosActive = false;
  clearInterval(shuffleInterval);
  
  stopBrudaSound();
  
  spiderEls.forEach((el, i) => {
    setTimeout(() => {
      el.style.transition = 'transform .45s, opacity .45s';
      el.style.transform = 'scale(0) rotate(720deg)';
      el.style.opacity = '0';
    }, i * 10);
  });

  setTimeout(() => {
    const layer = document.getElementById('chaos-layer');
    layer.innerHTML = '';
    layer.classList.remove('active');
    spiderEls = [];
    goStart();
  }, 2500);
}
</script>
</body>
</html>
